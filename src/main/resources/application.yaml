spring:
  application:
    name: librayapi
  profiles:
    active: ${SPRING_PROFILES_ACTIVE}
  output:
    ansi:
      enabled: ALWAYS

  datasource:
    url: ${DATASOURCE_URL:jdbc:postgresql://localhost:5432/library}
    username: ${DATASOURCE_USERNAME:postgres}
    password: ${DATASOURCE_PASSWORD:postgres}
    driverClassName: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate.format_sql: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
logging:
  pattern:
    console:''
  file:
    name: app.log
  level:
    root: warn
    com:
      thai:
        tec:
          libraryapi: trace
    org:
      springframework:
        web: debug

management:
  server:
    port: 9090
  endpoints:
    web:
      exposure:
        include: '*'

#producao
---
spring:
  config:
    activate:
      on-profile: production
  jpa:
    show-sql: false

#homologacao
---
spring:
  config:
    activate:
      on-profile: homologacao
  jpa:
    show-sql: true
