spring:
  application:
    name: librayapi
  output:
    ansi:
      enabled: ALWAYS
  datasource:
    url: jdbc:postgresql://localhost:5432/library
    username: postgres
    password: postgres
    driverClassName: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate.format_sql: true
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
logging:
  pattern:
    console:''
  file:
    name: app.log
  level:
    root: warn
    com:
      thai:
        tec:
          libraryapi: trace
    org:
      springframework:
        web: debug

management:
  server:
    port: 9090
  endpoints:
    web:
      exposure:
        include: '*'