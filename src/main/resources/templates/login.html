<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>

        body{
            height:100vh;
            background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
            display:flex;
            align-items:center;
            justify-content:center;
            font-family:system-ui;
        }

        .login-card{
            width:100%;
            max-width:420px;
            border:none;
            border-radius:18px;
            padding:30px;
            background:white;
            box-shadow:0 15px 40px rgba(0,0,0,0.35);
        }

        .login-title{
            font-weight:700;
        }

        .form-control{
            border-radius:10px;
            padding:10px;
        }

        .form-control:focus{
            box-shadow:0 0 0 2px rgba(13,110,253,0.25);
        }

        .btn-login{
            border-radius:10px;
            font-weight:600;
            padding:10px;
        }

        .btn-google{
            border-radius:10px;
            padding:10px;
            font-weight:600;
            border:1px solid #ddd;
            background:white;
            transition:0.2s;
        }

        .btn-google:hover{
            background:#f5f5f5;
        }

        .divider{
            display:flex;
            align-items:center;
            text-align:center;
            margin:20px 0;
        }

        .divider::before,
        .divider::after{
            content:'';
            flex:1;
            border-bottom:1px solid #ddd;
        }

        .divider:not(:empty)::before{
            margin-right:.75em;
        }

        .divider:not(:empty)::after{
            margin-left:.75em;
        }

    </style>
</head>

<body>

<div class="login-card">

    <div class="text-center mb-4">
        <h3 class="login-title">Login</h3>
        <p class="text-muted">Acesse sua conta</p>
    </div>

    <!-- erro login -->
    <div th:if="${param.error}" class="alert alert-danger text-center">
        Usuário ou senha inválidos
    </div>

    <!-- logout -->
    <div th:if="${param.logout}" class="alert alert-success text-center">
        Logout realizado com sucesso
    </div>

    <form method="post" th:action="@{/login}">

        <div class="mb-3">
            <label class="form-label">Usuário</label>
            <div class="input-group">
                <span class="input-group-text">
                    <i class="bi bi-person"></i>
                </span>
                <input type="text" class="form-control" name="username" placeholder="Digite seu usuário" required>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Senha</label>
            <div class="input-group">
                <span class="input-group-text">
                    <i class="bi bi-lock"></i>
                </span>
                <input type="password" class="form-control" name="password" placeholder="Digite sua senha" required>
            </div>
        </div>

        <div class="d-flex justify-content-between mb-3">

            <div class="form-check">
                <input type="checkbox" class="form-check-input">
                <label class="form-check-label">Lembrar-me</label>
            </div>

            <a href="#" class="text-decoration-none small">
                Esqueceu a senha?
            </a>

        </div>

        <button type="submit" class="btn btn-primary w-100 btn-login">
            <i class="bi bi-box-arrow-in-right"></i> Entrar
        </button>

    </form>

    <div class="divider text-muted small">
        ou continue com
    </div>

    <!-- Login Google -->
    <a th:href="@{/oauth2/authorization/google}" class="btn btn-google w-100 d-flex align-items-center justify-content-center gap-2">

        <img src="https://developers.google.com/identity/images/g-logo.png" width="20">

        Entrar com Google

    </a>

</div>

</body>
</html>
